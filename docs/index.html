<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASCII Table Image Generator</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #11111b;
  color: #cdd6f4;
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
h1 { margin: 20px 0 8px; font-size: 28px; letter-spacing: -0.5px; }
.sub { color: #6c7086; margin-bottom: 24px; font-size: 14px; }
.container {
  max-width: 900px;
  width: 100%;
}

/* Input panel */
.panel {
  background: #1e1e2e;
  border: 1px solid #313244;
  border-radius: 12px;
  padding: 20px;
}
.panel h2 { font-size: 16px; margin-bottom: 12px; color: #a6adc8; }
textarea {
  width: 100%;
  height: 220px;
  background: #181825;
  border: 1px solid #45475a;
  border-radius: 8px;
  color: #cdd6f4;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  padding: 12px;
  resize: vertical;
  outline: none;
}
textarea:focus { border-color: #89b4fa; }
.label { font-size: 13px; color: #a6adc8; margin: 12px 0 4px; }

/* Style buttons */
.style-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.style-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #45475a;
  background: #313244;
  color: #cdd6f4;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.style-btn:hover { background: #45475a; }
.style-btn.active {
  background: #89b4fa;
  color: #11111b;
  border-color: #89b4fa;
  font-weight: 600;
}

/* Buttons & toolbar */
.toolbar {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 8px;
}
.toolbar .label-sm { color: #a6adc8; font-size: 12px; margin-right: 4px; }
.tool-btn {
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid #45475a;
  background: #313244;
  color: #cdd6f4;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
  white-space: nowrap;
  line-height: 1.4;
}
.tool-btn:hover { background: #45475a; }
.tool-btn.active { background: #89b4fa; color: #11111b; border-color: #89b4fa; font-weight: 600; }
.tool-btn.primary { background: #89b4fa; color: #11111b; border-color: #89b4fa; font-weight: 600; }
.tool-btn.primary:hover { background: #74c7ec; }
.tool-sep { width: 1px; height: 20px; background: #45475a; margin: 0 4px; display: inline-block; }

/* Preview panel */
/* Preview panel */
.preview-panel {
  background: #1e1e2e;
  border: 1px solid #313244;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
  display: flex;
  flex-direction: column;
}
.preview-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
  border-radius: 8px;
  background: #181825;
  min-height: 200px;
  position: relative;
}

/* The actual table — rendered here */
#table-wrap {
  display: inline-block;
  padding: 20px;
  font-size: 20px;
  transform-origin: top center;
}

/* Dark theme */
.dark-theme table {
  border-collapse: collapse;
  font-family: 'Noto Sans Thai', 'Noto Color Emoji', sans-serif;
  color: #cdd6f4;
}
.dark-theme th, .dark-theme td {
  border: 2px solid #45475a;
  padding: 10px 24px;
  text-align: left;
  white-space: nowrap;
}
.dark-theme th { background: #313244; font-weight: 700; }
.dark-theme td { background: #1e1e2e; }

/* Light theme */
.light-theme table {
  border-collapse: collapse;
  font-family: 'Noto Sans Thai', 'Noto Color Emoji', sans-serif;
  color: #1e1e2e;
}
.light-theme th, .light-theme td {
  border: 2px solid #ccc;
  padding: 10px 24px;
  text-align: left;
  white-space: nowrap;
}
.light-theme th { background: #f5f5f5; font-weight: 700; }
.light-theme td { background: #fff; }

/* Minimal theme */
.minimal-theme table {
  border-collapse: collapse;
  font-family: 'Noto Sans Thai', 'Noto Color Emoji', sans-serif;
  color: #cdd6f4;
}
.minimal-theme th, .minimal-theme td {
  border: 1px solid #555;
  padding: 10px 24px;
  text-align: left;
  white-space: nowrap;
}
.minimal-theme th { background: #2a2a3a; font-weight: 700; }
.minimal-theme td { background: #1e1e2e; }

/* Compact theme */
.compact-theme table {
  border-collapse: collapse;
  font-family: 'Noto Sans Thai', 'Noto Color Emoji', sans-serif;
  color: #cdd6f4;
}
.compact-theme th, .compact-theme td {
  border: 1px solid #45475a;
  padding: 4px 12px;
  text-align: left;
  white-space: nowrap;
}
.compact-theme th { background: #313244; font-weight: 700; }
.compact-theme td { background: #1e1e2e; }

/* Footer */
.footer {
  margin-top: 30px;
  font-size: 13px;
  color: #585b70;
  text-align: center;
}
.footer a { color: #89b4fa; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>📊 ASCII Table → Image</h1>
<p class="sub">Paste CSV data, pick a style, download as PNG — Thai, Pali & emoji ready</p>

<div class="container">

  <!-- Input panel -->
  <div class="panel" style="padding: 12px 16px;">
    <textarea id="csv-input" style="height:130px;font-size:12px;margin-bottom:10px;" placeholder="Accept any format: CSV, Markdown pipe, Grid (+--+), Box (┌─┬┐)

CSV:     คำบาลี,Roman
Pipe:    | คำบาลี | Roman |
Grid:    +--------+-------+
Box:     ┌────────┬───────┐"></textarea>

    <div class="toolbar" style="margin-top:10px;">
      <button class="tool-btn active" data-style="dark">Dark</button>
      <button class="tool-btn" data-style="light">Light</button>
      <button class="tool-btn" data-style="minimal">Min</button>
      <button class="tool-btn" data-style="compact">Compact</button>
      <span class="tool-sep"></span>
      <button class="tool-btn" data-size="16">16</button>
      <button class="tool-btn active" data-size="20">20</button>
      <button class="tool-btn" data-size="24">24</button>
      <button class="tool-btn" data-size="28">28</button>
    </div>
    <div class="toolbar" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:6px;">
      <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
        <button class="tool-btn primary" onclick="downloadPNG()">⬇ PNG</button>
        <button class="tool-btn" onclick="copyHTML()">📋 HTML</button>
        <span class="tool-sep"></span>
        <button class="tool-btn" onclick="exportSVG()">SVG</button>
        <button class="tool-btn" onclick="exportGrid()">+--+</button>
        <button class="tool-btn" onclick="exportBox()">┌─┬┐</button>
        <button class="tool-btn" onclick="exportPipe()">| |</button>
      </div>
      <div style="margin-left:auto;display:flex;gap:4px;align-items:center;">
        <button class="tool-btn" onclick="clearData()" style="color:#f38ba8;font-size:11px;padding:2px 8px;">✕ Clear</button>
        <button class="tool-btn" onclick="pasteData()" style="color:#a6e3a1;font-size:11px;padding:2px 8px;">📋 Paste</button>
      </div>
    </div>
    </div>
  </div>

  <!-- Preview panel -->
  <div class="preview-panel">
    <h2>👁 Preview</h2>
    <div class="preview-wrap" id="preview-wrap">
      <div id="table-wrap" class="dark-theme"></div>
    </div>
  </div>

</div>

<div class="footer">
  Part of <a href="https://github.com/dhammawatthumpra-coder/ascii-table-mcp">ascii-table-mcp</a> —
  MIT License
</div>

<script>
const TEXTAREA = document.getElementById('csv-input');
const TABLE_WRAP = document.getElementById('table-wrap');
const PREVIEW_WRAP = document.getElementById('preview-wrap');

let currentStyle = 'dark';
let currentSize = 20;

// Parse CSV / Markdown pipe / Grid box (+--+, ┌─┬┐) → 2D array
function parseData(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length === 0) return [];

  // Detect: Markdown pipe table (lines start with |)
  const pipeLines = lines.filter(l => l.trim().startsWith('|'));
  if (pipeLines.length >= 2) {
    // Skip separator line (|--|--|)
    const dataLines = pipeLines.filter(l => !/^\|[- :]+\|/.test(l.trim()));
    return dataLines.map(l => {
      const cells = l.split('|').filter(c => c.trim() !== '');
      return cells.map(c => c.trim());
    });
  }

  // Detect: Code block table (grid +--+ or box ┌─┬┐)
  // Signal: lines with + or ┌/├/└ alternating with lines having | or │
  const hasBorder = lines.some(l => /^[+┌├└╔╠╚]/.test(l.trim()));
  const dataLines = hasBorder
    ? lines.filter(l => /[│|]/.test(l) && !/^[+┌├└╔╠╚][─═-]/.test(l.trim()))
    : null;

  if (dataLines && dataLines.length >= 1) {
    return dataLines.map(l => {
      // Split by │ or | and trim each cell
      const cells = l.split(/[│|]/).filter(c => c.trim() !== '');
      return cells.map(c => c.trim());
    });
  }

  // Fallback: CSV
  return lines.map(l => {
    const row = [];
    let current = '';
    let inQuote = false;
    for (const ch of l) {
      if (ch === '"') { inQuote = !inQuote; continue; }
      if (ch === ',' && !inQuote) { row.push(current.trim()); current = ''; continue; }
      current += ch;
    }
    row.push(current.trim());
    return row;
  });
}

// Render table
function render() {
  const raw = TEXTAREA.value;
  const data = parseData(raw);
  if (data.length === 0) {
    TABLE_WRAP.innerHTML = '<div style="color:#6c7086;padding:40px;text-align:center;">✨ Paste data to see preview</div>';
    TABLE_WRAP.style.transform = '';
    return;
  }

  const headers = data[0];
  const rows = data.slice(1);

  let html = '<table>';
  html += '<tr>' + headers.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';
  for (const row of rows) {
    html += '<tr>' + row.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>';
  }
  html += '</table>';

  TABLE_WRAP.innerHTML = html;

  // Auto-scale to fit preview width
  fitTable();
}

function fitTable() {
  const wrap = PREVIEW_WRAP;
  const table = TABLE_WRAP.querySelector('table');
  if (!table) return;

  // Reset transform first so we measure natural size
  TABLE_WRAP.style.transform = '';
  const wrapW = wrap.clientWidth - 40; // minus padding
  const tableW = table.scrollWidth + 40; // plus padding

  if (tableW > wrapW) {
    const scale = wrapW / tableW;
    TABLE_WRAP.style.transform = `scale(${scale})`;
    // Adjust height so container doesn't collapse
    TABLE_WRAP.style.height = (table.scrollHeight + 40) * scale + 'px';
  } else {
    TABLE_WRAP.style.transform = '';
    TABLE_WRAP.style.height = '';
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Rebuild classlist for theme
function applyStyle(style) {
  currentStyle = style;
  TABLE_WRAP.className = style + '-theme';
  // Update active button
  document.querySelectorAll('.tool-btn[data-style]').forEach(b => {
    b.classList.toggle('active', b.dataset.style === style);
  });
  // Update preview bg
  const bg = style === 'light' ? '#f5f5f5' : '#181825';
  PREVIEW_WRAP.style.background = bg;
  render();
  setTimeout(fitTable, 50);
}

function applySize(size) {
  currentSize = parseInt(size);
  TABLE_WRAP.style.fontSize = size + 'px';
  document.querySelectorAll('.tool-btn[data-size]').forEach(b => {
    b.classList.toggle('active', b.dataset.size === size);
  });
  setTimeout(fitTable, 50);
}

// Tool button clicks
document.querySelectorAll('.tool-btn[data-style]').forEach(btn => {
  btn.addEventListener('click', () => applyStyle(btn.dataset.style));
});
document.querySelectorAll('.tool-btn[data-size]').forEach(btn => {
  btn.addEventListener('click', () => applySize(btn.dataset.size));
});

// Clear input
function clearData() {
  TEXTAREA.value = '';
  render();
}

// Paste from clipboard
function pasteData() {
  navigator.clipboard.readText().then(text => {
    if (text) {
      TEXTAREA.value = text;
      render();
    }
  }).catch(() => {
    // Fallback: focus and let user Ctrl+V
    TEXTAREA.focus();
    document.execCommand('paste');
  });
}

// Auto-render on input
TEXTAREA.addEventListener('input', render);

// Re-fit on window resize
window.addEventListener('resize', fitTable);

// Download PNG
async function downloadPNG() {
  const table = TABLE_WRAP.querySelector('table');
  if (!table || !table.rows.length) return;

  const btn = document.querySelector('.tool-btn.primary');
  const origText = btn.textContent;
  btn.textContent = '⏳...';
  btn.disabled = true;

  try {
    const bg = currentStyle === 'light' ? '#ffffff' : '#1e1e2e';

    const canvas = await html2canvas(table, {
      scale: 2,
      backgroundColor: bg,
      useCORS: true,
      logging: false,
      width: table.scrollWidth,
      height: table.scrollHeight,
    });

    // Add padding to canvas
    const pad = 20;
    const padded = document.createElement('canvas');
    padded.width = canvas.width + pad * 2;
    padded.height = canvas.height + pad * 2;
    const ctx = padded.getContext('2d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, padded.width, padded.height);
    ctx.drawImage(canvas, pad, pad);

    // Download
    const link = document.createElement('a');
    link.download = 'table_' + currentStyle + '.png';
    link.href = padded.toDataURL('image/png');
    link.click();
  } catch (err) {
    alert('PNG error: ' + err.message);
  }

  btn.textContent = origText;
  btn.disabled = false;
}

// Copy HTML
function copyHTML() {
  const html = TABLE_WRAP.innerHTML;
  navigator.clipboard.writeText(html).then(() => {
    alert('📋 HTML copied!');
  }).catch(() => {
    alert('❌ Copy failed — select and copy manually');
  });
}

// --- helpers for code-block exports ---
function getData() {
  const raw = TEXTAREA.value;
  const data = parseData(raw);
  if (data.length < 2) return null;
  return { headers: data[0], rows: data.slice(1) };
}

function downloadText(text, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = URL.createObjectURL(new Blob([text], {type: 'text/plain'}));
  link.click();
  URL.revokeObjectURL(link.href);
}

// Measure display width (simple: len for now — good enough for code-block alignment)
function dw(s) { return String(s).length; }

function buildCodeTable(headers, rows, chars) {
  // chars: { tl, tm, tr, ml, mm, mr, bl, bm, br, h, v }
  const colW = headers.map((h, ci) => {
    let max = dw(h);
    for (const r of rows) if (dw(r[ci]) > max) max = dw(r[ci]);
    return max;
  });

  const sep = (l, m, r) => {
    let s = l;
    for (const w of colW) s += chars.h.repeat(w + 2) + m;
    return s.slice(0, -m.length) + r + '\n';
  };

  let out = sep(chars.tl, chars.tm, chars.tr);
  out += chars.v + ' ';
  out += headers.map((h, i) => h.padEnd(colW[i])).join(' ' + chars.v + ' ');
  out += ' ' + chars.v + '\n';
  out += sep(chars.ml, chars.mm, chars.mr);
  for (const row of rows) {
    out += chars.v + ' ';
    out += row.map((c, i) => String(c).padEnd(colW[i])).join(' ' + chars.v + ' ');
    out += ' ' + chars.v + '\n';
  }
  out += sep(chars.bl, chars.bm, chars.br);
  return out;
}

// --- export functions ---

function exportSVG() {
  const d = getData();
  if (!d) { alert('No data'); return; }
  const { headers, rows } = d;
  const fontSize = currentSize;
  const padX = currentStyle === 'compact' ? 12 : 24;
  const padY = currentStyle === 'compact' ? 4 : 10;

  const thBg = currentStyle === 'light' ? '#f5f5f5' : '#313244';
  const tdBg = currentStyle === 'light' ? '#ffffff' : '#1e1e2e';
  const borderColor = currentStyle === 'light' ? '#ccc' : '#45475a';
  const bgColor = currentStyle === 'light' ? '#ffffff' : '#1e1e2e';
  const textColor = currentStyle === 'light' ? '#1e1e2e' : '#cdd6f4';
  const borderW = currentStyle === 'minimal' ? 1 : 2;

  // Measure column widths (approximate using char width)
  const charW = fontSize * 0.6;
  const colW = headers.map((h, ci) => {
    let max = dw(h);
    for (const r of rows) if (dw(r[ci]) > max) max = dw(r[ci]);
    return max * charW + padX * 2;
  });
  const rowH = fontSize * 1.4 + padY * 2;
  const totalW = colW.reduce((a, b) => a + b, 0) + borderW;
  const totalH = rowH * (rows.length + 1) + borderW;
  const gPad = 20;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW + gPad*2}" height="${totalH + gPad*2}" viewBox="0 0 ${totalW + gPad*2} ${totalH + gPad*2}">
<rect x="0" y="0" width="${totalW + gPad*2}" height="${totalH + gPad*2}" fill="${bgColor}"/>
<g transform="translate(${gPad}, ${gPad})">`;

  function drawRow(y, bg, cells, bold) {
    let x = 0;
    for (let ci = 0; ci < cells.length; ci++) {
      svg += `<rect x="${x}" y="${y}" width="${colW[ci]}" height="${rowH}" fill="${bg}" stroke="${borderColor}" stroke-width="${borderW}"/>`;
      const textX = x + padX;
      const textY = y + rowH/2 + fontSize*0.4;
      svg += `<text x="${textX}" y="${textY}" font-family="Noto Sans Thai, Noto Color Emoji, sans-serif" font-size="${fontSize}" font-weight="${bold ? 700 : 400}" fill="${textColor}" dominant-baseline="central">${esc(String(cells[ci]))}</text>`;
      x += colW[ci];
    }
  }

  drawRow(0, thBg, headers, true);
  for (let ri = 0; ri < rows.length; ri++) {
    drawRow(rowH * (ri + 1), tdBg, rows[ri], false);
  }

  svg += '</g></svg>';
  downloadText(svg, 'table_' + currentStyle + '.svg');
}

function exportGrid() {
  const d = getData();
  if (!d) { alert('No data'); return; }
  const text = buildCodeTable(d.headers, d.rows, {
    tl:'+', tm:'+', tr:'+',
    ml:'+', mm:'+', mr:'+',
    bl:'+', bm:'+', br:'+',
    h:'-', v:'|'
  });
  downloadText(text, 'table_grid.txt');
}

function exportBox() {
  const d = getData();
  if (!d) { alert('No data'); return; }
  const text = buildCodeTable(d.headers, d.rows, {
    tl:'┌', tm:'┬', tr:'┐',
    ml:'├', mm:'┼', mr:'┤',
    bl:'└', bm:'┴', br:'┘',
    h:'─', v:'│'
  });
  downloadText(text, 'table_box.txt');
}

function exportPipe() {
  const d = getData();
  if (!d) { alert('No data'); return; }
  const colW = d.headers.map((h, ci) => {
    let max = dw(h);
    for (const r of d.rows) if (dw(r[ci]) > max) max = dw(r[ci]);
    return max;
  });
  let out = '| ' + d.headers.map((h, i) => h.padEnd(colW[i])).join(' | ') + ' |\n';
  out += '|-' + colW.map(w => '-'.repeat(w)).join('-|-') + '-|\n';
  for (const row of d.rows) {
    out += '| ' + row.map((c, i) => String(c).padEnd(colW[i])).join(' | ') + ' |\n';
  }
  downloadText(out, 'table_pipe.md');
}

// Load default example
render();
</script>
</body>
</html>
